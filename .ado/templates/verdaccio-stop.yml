parameters:
  - name: uploadLogs
    type: boolean
    default: true

steps:
  # Reclaim memory used by Verdaccio to reduce the chance of build OOM issues
  - script: tskill node
    displayName: Kill Verdaccio
    condition: succeededOrFailed()

  # Verdaccio log artifact publishing moved to templateContext.outputs in cli-init-windows.yml (1ES compliance)
